server:
  port: ${PORT:8084}

spring:
  application:
    name: notification_service

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq_broker}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  mail:
    host: smtp.gmail.com
    port: 587
    # THE FIX: Secured Gmail credentials behind environment variables
    username: ${MAIL_USERNAME:dummy_email@gmail.com}
    password: ${MAIL_PASSWORD:dummy_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: "NPCine Notification Service"
    description: "Handles asynchronous email notifications via RabbitMQ"
    version: "1.0.0"