server.port=${PORT:8081}
spring.application.name=api-gateway

# ================= USER SERVICE ROUTES =================
# Route A: pass-through for auth and users endpoints
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-main
spring.cloud.gateway.server.webmvc.routes[0].uri=${USER_SERVICE_URL:http://user-service:8080}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**,/users/**

# Route B: backward compatibility for clients hitting /login or /register directly
spring.cloud.gateway.server.webmvc.routes[1].id=user-service-auth-shortcuts
spring.cloud.gateway.server.webmvc.routes[1].uri=${USER_SERVICE_URL:http://user-service:8080}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/login,/register
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=RewritePath=/(?<path>login|register),/auth/$\{path}

# ================= BOOKING SERVICE ROUTE =================
spring.cloud.gateway.server.webmvc.routes[2].id=booking-service
spring.cloud.gateway.server.webmvc.routes[2].uri=${BOOKING_SERVICE_URL:http://booking-service:8082}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/bookings/**,/catalog/**,/admin/**

# ================= PAYMENT SERVICE ROUTE =================
spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=${PAYMENT_SERVICE_URL:http://payment-service:8083}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/payments/**

# ================= NOTIFICATION SERVICE ROUTE =================
spring.cloud.gateway.server.webmvc.routes[4].id=notification-service
spring.cloud.gateway.server.webmvc.routes[4].uri=${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/notifications/**,/test-email

# ================= SECURITY & OBSERVABILITY =================
jwt.secret=${JWT_SECRET:1JwCQ6Ipyd1CxytJccCkB754iRXoRlEly0HujDiqgkRZ4ZlmIUasTMwFhgl9kYep}

logging.level.org.springframework.cloud.gateway=INFO
management.endpoints.web.exposure.include=health,info,prometheus

