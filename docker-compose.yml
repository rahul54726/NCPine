  booking-service:
    build: ./booking-service
    image: ${DOCKER_USERNAME}/npcine-booking-service:latest
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - npcine_net
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq_broker:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/npcine_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_RABBITMQ_HOST=rabbitmq_broker
      - SPRING_DATA_REDIS_HOST=redis_cache
      - SPRING_DATA_REDIS_PORT=6379

  payment-service:
    build: ./payment-service
    image: ${DOCKER_USERNAME}/npcine-payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    networks:
      - npcine_net
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq_broker:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/npcine_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_RABBITMQ_HOST=rabbitmq_broker

  notification-service:
    build: ./notification_service
    image: ${DOCKER_USERNAME}/npcine-notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    networks:
      - npcine_net
    depends_on:
      rabbitmq_broker:
        condition: service_healthy
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq_broker

  # ========================================
  # 3. API GATEWAY
  # ========================================
  api-gateway:
    build: ./api-gateway
    image: ${DOCKER_USERNAME}/npcine-api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - npcine_net
    depends_on:
      - user-service
      - movies-service
      - booking-service
      - payment-service
      - notification-service
