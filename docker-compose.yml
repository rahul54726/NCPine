version: '3.8'

networks:
  npcine_net:
    driver: bridge

services:
  # ========================================
  # 1. DATABASES & CACHE & MESSAGE BROKER
  # ========================================
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: npcine_db
    ports:
      - "5432:5432"
    networks:
      - npcine_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d npcine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq_broker:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_broker
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - npcine_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - npcine_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========================================
  # 2. MICROSERVICES
  # ========================================
  user-service:
    build: ./user-service
    image: ${DOCKER_USERNAME}/npcine-user-service:latest
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - npcine_net
    depends_on:
      rabbitmq_broker:
        condition: service_healthy
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq_broker
