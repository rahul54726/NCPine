server:
  port: ${PORT:8082}

spring:
  application:
    name: booking-service

  datasource:
    # THE FIX: Defaulting to Docker container name 'postgres_db' and 'npcine_db'
    url: jdbc:postgresql://${DB_HOST:postgres_db}:${DB_PORT:5432}/${DB_NAME:npcine_db}
    username: ${POSTGRES_USER:postgres}
    # THE FIX: Removed hardcoded password
    password: ${POSTGRES_PASSWORD:dummy_local_db_password}
    driver-class-name: org.postgresql.Driver

    # Production pool settings
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      # THE FIX: Since Flyway is enabled, Hibernate should only 'validate' in prod, not 'update'
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      # THE FIX: Defaulting to Docker container name 'redis_cache'
      host: ${REDIS_HOST:redis_cache}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

jwt:
  # THE FIX: Removed real JWT secret
  secret: ${JWT_SECRET_KEY:dummy_local_secret_do_not_use_in_prod}
  expiration: ${JWT_EXPIRATION:86400000}

# Production Logging
logging:
  level:
    root: INFO
    com.rahul.cinebook: DEBUG
    org.hibernate.SQL: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, actuator
  endpoint:
    health:
      show-details: always